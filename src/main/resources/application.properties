spring.application.name=minimarket
# Configuracion de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuracion de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Puerto de ejecucion de la aplicacion Minimarket (8080 queda reservado para Jenkins)
server.port=9090

# Configuracion JWT
app.jwt.secret=change-this-jwt-secret-key-with-at-least-thirty-two-bytes
app.jwt.expiration-ms=3600000
